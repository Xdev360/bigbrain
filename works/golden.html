<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GOLDEN — Oladele Ibraheem</title>
<meta name="description" content="Consistency app — master goals broken into yearly, monthly, weekly and daily discipline.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
<link rel="stylesheet" href="../css/ai-overlay.css">
<link rel="stylesheet" href="../css/case.css">
</head>
<body data-project="golden" data-asset-root="../">

<div class="guide" id="guide" aria-hidden="true">
  <svg class="guide-svg" id="guideSvg" xmlns="http://www.w3.org/2000/svg">
    <path class="guide-rail" id="guideRail" fill="none"></path>
  </svg>
  <div class="guide-traveler" id="guideTraveler">
    <div class="guide-chat" id="guideChat"><p id="guideChatText"></p></div>
    <div class="guide-menu" id="guideMenu" hidden>
      <button type="button" id="menuTour" aria-pressed="false">Tour</button>
      <button type="button" id="menuChatAi">Chat with X Big X</button>
      <button type="button" id="menuMusic">Music</button>
    </div>
    <button type="button" class="guide-avatar is-invite" id="guideAvatar" aria-label="Guide — click for options">
      <img src="../assets/portrait.jpg" alt="" width="56" height="56">
      <span class="guide-live" aria-hidden="true"></span>
      <span class="guide-note" aria-hidden="true">♪</span>
    </button>
  </div>
  <audio id="guideTrack" loop preload="none" src="../assets/music/tension.mp3"></audio>
</div>

<div class="ai-overlay" id="aiOverlay" aria-hidden="true">
  <div class="ai-sheet" role="dialog" aria-labelledby="aiTitle">
    <div class="ai-sheet-head">
      <div><p>Ask</p><h2 id="aiTitle">Chat with X Big X</h2></div>
      <button class="ai-sheet-close" type="button" id="aiClose" aria-label="Close">×</button>
    </div>
    <div class="ai-log" data-ai-log></div>
    <div class="ai-presets" data-ai-presets></div>
    <form class="ai-form" data-ai-form>
      <input data-ai-input type="text" placeholder="Ask anything…" autocomplete="off">
      <button type="submit" aria-label="Send">Send</button>
    </form>
  </div>
</div>

<div class="music-dock" id="musicDock" hidden>
  <button type="button" class="music-dock-toggle is-playing" id="musicDockToggle" aria-label="Pause music">♪</button>
  <button type="button" class="music-dock-close" id="musicDockClose" aria-label="Stop music">×</button>
</div>

<div id="projectRoot"></div>

<script>window.BIGBRAIN_CONFIG={knowledgeUrl:"../data/knowledge.json",substackUrl:"https://xbigbrainnx.substack.com",buyBase:"https://selar.com/m/xbig-brainnx1",telegramBotToken:"",telegramChatId:""};</script>
<script src="../js/projects-data.js"></script>
<script src="../js/project-folder.js"></script>
<script src="../js/ai.js"></script>
<script src="../js/tour.js"></script>
</body>
</html>
